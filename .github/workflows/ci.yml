name: CI - BREVET MASTER

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    env:
      QDRANT_URL: http://localhost:6333
      ARIA_MODE: mock
      ARIA_LLM_PROVIDER: mock
      QDRANT_TIMEOUT_MS: 2500
      SALT: "prod-salt-min-32-chars-xxxxxxxxxxxxxxxx"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npx vitest run

      - name: Env Control & Security Audit
        run: |
          echo "🌐 NODE_ENV=${NODE_ENV:-development}"
          echo "🛡️ Checking Security SALT..."
          test -n "$SALT" || (echo "❌ SALT missing" && exit 1)
          echo "✅ SALT is present."

      - name: Build Next.js
        run: NODE_ENV=production npm run build

      - name: Smoke Test (Production Readiness)
        run: npm run smoke:prod
        env:
          PORT: 3010
          NODE_ENV: production
