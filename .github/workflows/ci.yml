name: CI - BREVET MASTER

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    # 1. Injection au niveau du Job pour toutes les steps (DRY & Robustesse)
    env:
      QDRANT_URL: http://localhost:6333
      ARIA_MODE: mock
      ARIA_LLM_PROVIDER: mock
      QDRANT_TIMEOUT_MS: 2500
      SALT: "ci-dummy-salt-for-integration-32-chars"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run Unit Tests
        run: npx vitest run

      # 2. Step de Contrôle de Sécurité (Fail Fast)
      - name: Env Control & Security Audit
        run: |
          echo "🌐 NODE_ENV=${NODE_ENV:-development}"
          echo "🛡️ Checking Security SALT..."
          if [ -z "$SALT" ]; then
            echo "❌ CRITICAL: SALT is missing. Build aborted."
            exit 1
          fi
          echo "✅ SALT is present."

      - name: Build Next.js
        run: npm run build

      # Production Smoke Test (Portable)
      - name: Smoke Test (Production Readiness)
        run: npm run smoke:prod
        env:
          PORT: 3000
